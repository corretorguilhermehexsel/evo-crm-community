name: Build evo-frontend

on:
  workflow_dispatch:
    inputs:
      vite_api_url:
        description: 'URL da API (VITE_API_URL)'
        required: false
        default: 'http://localhost:3000'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./evo-ai-frontend-community
          file: ./evo-ai-frontend-community/Dockerfile
          push: true
          build-args: |
            VITE_API_URL=${{ github.event.inputs.vite_api_url }}
          tags: ghcr.io/${{ github.repository_owner }}/evo-frontend:latest
